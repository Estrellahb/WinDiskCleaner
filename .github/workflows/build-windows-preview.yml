name: Build Windows Preview

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows x64 Preview
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            C:\Users\runneradmin\.nuget\packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        timeout-minutes: 10
        run: dotnet restore src/WinDiskCleaner.App/WinDiskCleaner.App.csproj -r win-x64 --verbosity normal

      - name: Run tests
        run: dotnet test tests/WinDiskCleaner.Core.Tests/WinDiskCleaner.Core.Tests.csproj --configuration Release --no-restore

      - name: Publish Windows x64 self-contained app
        timeout-minutes: 15
        run: >
          dotnet publish src/WinDiskCleaner.App/WinDiskCleaner.App.csproj
          -c Release
          -r win-x64
          --self-contained true
          --no-restore
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:IncludeAllContentForSelfExtract=true
          -o artifacts/WinDiskCleaner-preview-win-x64

      - name: Prepare portable exe artifact
        shell: pwsh
        run: |
          $publishDir = "artifacts/WinDiskCleaner-preview-win-x64"
          $exePath = Join-Path $publishDir "WinDiskCleaner.exe"
          if (-not (Test-Path $exePath)) {
            Write-Error "Published executable was not found: $exePath"
            Get-ChildItem $publishDir -Recurse | Format-Table FullName, Length
            exit 1
          }

          Copy-Item $exePath "WinDiskCleaner-win-x64.exe" -Force
          Get-ChildItem $publishDir | Format-Table Name, Length
          Get-Item "WinDiskCleaner-win-x64.exe" | Format-Table Name, Length

      - name: Upload portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinDiskCleaner-win-x64-exe
          path: WinDiskCleaner-win-x64.exe

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: WinDiskCleaner-win-x64.exe
          prerelease: ${{ contains(github.ref_name, 'preview') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
